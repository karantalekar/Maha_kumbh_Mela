<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aadhaar Details</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(grey, black);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    form {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }

    h2 {
      color: #fff;
      text-align: center;
      margin-bottom: 20px;
      position: absolute;
      top: 30px;
      width: 100%;
    }

    input, button {
      display: block;
      margin: 10px 0;
      padding: 12px;
      width: 100%;
      font-size: 16px;
    }

    button {
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>

  <h2>Enter Aadhaar Details</h2>
  <form onsubmit="saveAadhaar(event)">
    <input type="text" id="aadhaar" placeholder="Aadhaar Number (12 digits)" required pattern="\d{12}">
    <input type="text" id="address" placeholder="Full Address" required>
    <input type="date" id="dob" placeholder="Date of Birth" required>
    <input type="tel" id="mobile" placeholder="Mobile Number (10 digits)" required pattern="\d{10}">
    <button type="submit">Submit</button>
  </form>

  <script>
    // Ensure user is logged in
    const user = JSON.parse(localStorage.getItem("loggedInUser"));
    if (!user || user.role !== "user") {
      alert("Access denied. Redirecting to login.");
      window.location.href = "index.html";
    }

    // Pre-fill form if data already exists
    document.addEventListener("DOMContentLoaded", () => {
      if (user.aadhaar) document.getElementById("aadhaar").value = user.aadhaar;
      if (user.address) document.getElementById("address").value = user.address;
      if (user.dob) document.getElementById("dob").value = user.dob;
      if (user.mobile) document.getElementById("mobile").value = user.mobile;
    });

    function saveAadhaar(event) {
      event.preventDefault();

      const aadhaar = document.getElementById("aadhaar").value.trim();
      const address = document.getElementById("address").value.trim();
      const dob = document.getElementById("dob").value;
      const mobile = document.getElementById("mobile").value.trim();

      // Validate Aadhaar
      if (!/^\d{12}$/.test(aadhaar)) {
        alert("Please enter a valid 12-digit Aadhaar number.");
        return;
      }

      // Validate Mobile
      if (!/^\d{10}$/.test(mobile)) {
        alert("Please enter a valid 10-digit mobile number.");
        return;
      }

      // Update user object
      user.aadhaar = aadhaar;
      user.address = address;
      user.dob = dob;
      user.mobile = mobile;

      // Update users list
      let users = JSON.parse(localStorage.getItem("users")) || [];
      users = users.map(u => u.username === user.username ? user : u);

      // Save updates
      localStorage.setItem("users", JSON.stringify(users));
      localStorage.setItem("loggedInUser", JSON.stringify(user));

      alert("Details saved successfully!");
      window.location.href = "user_panel.html";
    }
  </script>

</body>
</html>
