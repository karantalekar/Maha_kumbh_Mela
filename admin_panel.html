
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      /* background: linear-gradient(to right, #f7971e, #ffd200); orange-yellow gradient */
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h2 {
      color: white;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background-color: #007bff;
      color: white;
      cursor: pointer;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
    }

    button:hover {
      background-color: #0056b3;
    }

    ul#userList {
      list-style: none;
      padding: 0;
      margin-top: 30px;
      background: white;
      border-radius: 10px;
      max-height: 300px;
      overflow-y: auto;
      width: 80%;
      max-width: 400px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    ul#userList li {
      padding: 10px;
      border-bottom: 1px solid #ccc;
    }

    ul#userList li:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
<!-- 
  <h2>Welcome Admin</h2>
  <button onclick="showAllUsers()">Show All Users</button>
  <ul id="userList"></ul> -->

  <script src="script.js"></script>

  <!-- <h2>Welcome Admin</h2> -->

<!-- Search Bar -->
<input type="text" id="searchInput" placeholder="Search by username..." onkeyup="searchUsers()" style="padding:10px; width: 80%; max-width: 400px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc;">


<!-- Action Buttons -->
<div style="margin-bottom: 20px;">
  <button onclick="showAllUsers()">Show All Users</button>
  <button onclick="logout()" style="background: red; margin-left: 10px;">Logout</button>
</div>

<!-- User List -->
<ul id="userList"></ul>

  <script src="script.js"></script>

</body>
</html>
